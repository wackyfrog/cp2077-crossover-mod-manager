name: Release

on:
  push:
    tags:
      - "v*" # Trigger on version tags like v1.6.0, v1.6.1, etc.
  workflow_dispatch: # Allow manual trigger

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=$(grep '"version"' src-tauri/tauri.conf.json | head -1 | sed 's/.*"version": "\(.*\)".*/\1/')
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Read CHANGELOG
        id: changelog
        run: |
          # Extract the latest version's changelog
          VERSION=${{ steps.get_version.outputs.version }}
          CHANGELOG=$(awk "/^## \[$VERSION\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md || echo "See CHANGELOG.md for details")
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name || format('v{0}', steps.get_version.outputs.version) }}
          release_name: Release v${{ steps.get_version.outputs.version }}
          body: |
            # Crossover Mod Manager v${{ steps.get_version.outputs.version }}

            ## 📦 Downloads

            - **macOS (Apple Silicon)**: `Crossover.Mod.Manager_${{ steps.get_version.outputs.version }}_aarch64.dmg`

            ## 📝 What's Changed

            ${{ steps.changelog.outputs.changelog }}

            ## 🔧 Installation

            ### macOS (M1/M2/M3/M4)
            1. Download the DMG file
            2. Open the DMG and drag the app to your Applications folder
            3. Right-click and select "Open" the first time to bypass Gatekeeper

            **Requirements**: macOS 11.0+ (Big Sur or later) with Apple Silicon

            **Full Changelog**: https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md
          draft: false
          prerelease: false

  build-macos-apple-silicon:
    name: Build macOS Apple Silicon
    needs: create-release
    runs-on: macos-14 # Apple Silicon runner

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        run: npm run tauri build -- --target aarch64-apple-darwin

      - name: Rename DMG file
        run: |
          VERSION=${{ needs.create-release.outputs.version }}
          cd src-tauri/target/aarch64-apple-darwin/release/bundle/dmg
          # Find the DMG file (may have spaces in name)
          DMG_FILE=$(ls *.dmg | head -1)
          NEW_NAME="Crossover.Mod.Manager_${VERSION}_aarch64.dmg"
          mv "$DMG_FILE" "$NEW_NAME"
          echo "DMG_PATH=src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/$NEW_NAME" >> $GITHUB_ENV
          echo "DMG_NAME=$NEW_NAME" >> $GITHUB_ENV

      - name: Upload DMG to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ${{ env.DMG_PATH }}
          asset_name: ${{ env.DMG_NAME }}
          asset_content_type: application/x-apple-diskimage

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-aarch64-dmg
          path: ${{ env.DMG_PATH }}

  post-release:
    name: Post-Release Notifications
    needs: [create-release, build-macos-apple-silicon]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.build-macos-apple-silicon.result }}" = "success" ]; then
            echo "✅ Build completed successfully!"
            echo "Release v${{ needs.create-release.outputs.version }} is ready"
          else
            echo "❌ Build failed"
            exit 1
          fi
